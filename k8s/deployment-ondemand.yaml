apiVersion: apps/v1
kind: Deployment
metadata:
  name: ratio-app-ondemand
  namespace: ratio-app
  labels:
    app: ratio-app
    tier: on-demand
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ratio-app
      tier: on-demand
  template:
    metadata:
      labels:
        app: ratio-app
        tier: on-demand
    spec:
      nodeSelector:
        capacity-type: on-demand
      containers:
      - name: hpa-example
        image: registry.k8s.io/hpa-example
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 500m
            memory: 100Mi
          requests:
            cpu: 200m
            memory: 50Mi

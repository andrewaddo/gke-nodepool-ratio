apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ratio-app-ondemand-hpa
  namespace: ratio-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ratio-app-ondemand
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
